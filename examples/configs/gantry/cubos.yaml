# CubOS — Genmitsu 3018 PROVer V2 (standard gantry)
# Positive-space XY after xy_hard_limits homing. Z positive (down from home).

serial_port: /dev/ttyUSB0
cnc:
  homing_strategy: xy_hard_limits
  total_z_height: 90.0
  y_axis_motion: head

working_volume:
  x_min: 0.0
  x_max: 300.0
  y_min: 0.0
  y_max: 200.0
  z_min: 0.0
  z_max: 80.0

grbl_settings:
  dir_invert_mask: 2
  status_report: 0
  hard_limits: true
  homing_enable: true
  homing_dir_mask: 3
  homing_pull_off: 2.0
  steps_per_mm_x: 800.0
  steps_per_mm_y: 800.0
  steps_per_mm_z: 800.0
  max_rate_x: 2000.0
  max_rate_y: 2000.0
  max_rate_z: 2000.0
  accel_x: 50.0
  accel_y: 50.0
  accel_z: 50.0
  max_travel_x: 300.0
  max_travel_y: 200.0
  max_travel_z: 80.0
