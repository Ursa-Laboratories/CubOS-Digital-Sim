# MOFcat deck configuration — labware only.

labware:
  plate_1:
    load_name: sbs_96_wellplate
    name: corning_96_well_360ul
    model_name: corning_3590_96well
    # Corning 3590 is 14.22 mm tall (standard SBS template assumes 14.35 mm).
    height_mm: 14.22
    calibration:
      a1:
        x: 17.88
        y: 42.23
        z: 20.0
      a2:
        x: 17.88
        y: 51.23
    # Override the 200/150 µL template defaults for this 360 µL round-bottom plate.
    capacity_ul: 360.0
    working_volume_ul: 200.0
